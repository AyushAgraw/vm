trigger: none
pool: netflix-agent

steps:
  - task: PowerShell@2
    inputs:
      targetType: 'inline'
      script: |
        # Write your PowerShell commands here.
        
        pwd
  - task: TerraformTask@5
    inputs:
      provider: 'azurerm'
      command: 'validate'

  - task: TerraformTask@5
    inputs:
      provider: 'azurerm'
      command: 'init'
      workingDirectory: '$(System.DefaultWorkingDirectory)\Parent\DEV\'
      backendServiceArm: 'netflix-service-connection'
      backendAzureRmResourceGroupName: 'rg841'
      backendAzureRmStorageAccountName: 'st841'
      backendAzureRmContainerName: 'cont841'
      backendAzureRmKey: 'backend.tfstate'

     